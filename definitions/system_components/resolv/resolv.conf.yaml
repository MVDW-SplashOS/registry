file:
    location: /etc/resolv.conf
    format: key-value
    encoding: utf-8
    permissions: "0644"
    owner: root
    group: root

syntax:
    comment_char: "#"
    line_continuation: ""
    case_sensitive: false
    delimiter: " "

structures:
    main:
        options:
            nameserver:
                type: string
                default: ""
                description: DNS server IP address

            domain:
                type: string
                default: ""
                description: Local domain name

            search:
                type: string
                default: ""
                description: Domain search list

            sortlist:
                type: string
                default: ""
                description: Address sorting list

            options:
                type: string
                default: ""
                description: Internal resolver options
