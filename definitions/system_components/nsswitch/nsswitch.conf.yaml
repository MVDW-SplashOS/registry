file:
    location: /etc/nsswitch.conf
    format: key-value
    encoding: utf-8
    permissions: "0644"
    owner: root
    group: root

syntax:
    comment_char: "#"
    line_continuation: ""
    case_sensitive: false
    delimiter: ":"

structures:
    main:
        options:
            passwd:
                type: string
                default: compat
                description: Password database

            group:
                type: string
                default: compat
                description: Group database

            shadow:
                type: string
                default: compat
                description: Shadow password database

            hosts:
                type: string
                default: files dns
                description: Host name resolution

            networks:
                type: string
                default: files
                description: Network database

            protocols:
                type: string
                default: files
                description: Protocols database

            services:
                type: string
                default: files
                description: Services database

            ethers:
                type: string
                default: files
                description: Ethernet database

            rpc:
                type: string
                default: files
                description: RPC database

            netgroup:
                type: string
                default: ""
                description: Netgroup database
