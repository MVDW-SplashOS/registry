[package]
name = "libregistry"
version = "0.1.0"
edition = "2021"
authors = ["MVDW-Java"]
license = "GPL-3.0-or-later"
description = "A library to manage system configuration like a registry"
repository = "https://github.com/MVDW-SplashOS/registry"

[lib]
name = "registry"
crate-type = ["lib", "staticlib", "cdylib"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
toml = "0.8"
quick-xml = { version = "0.37", features = ["serialize"] }
thiserror = "2.0"
log = "0.4"
env_logger = "0.11"
lazy_static = "1.5"
regex = "1.10"

[dev-dependencies]
tempfile = "3.14"

[[test]]
name = "integration"
path = "tests/integration.rs"
