name: Tests

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

jobs:
    build-library:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-action@stable

            - name: Cache Cargo dependencies
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      library/target
                  key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

            - name: Build library
              run: |
                  cd library
                  cargo build --release

            - name: Run tests
              run: |
                  cd library
                  cargo test --release

    build-cli:
        runs-on: ubuntu-latest
        needs: build-library

        steps:
            - uses: actions/checkout@v4

            - name: Install Zig
              uses: koalaman/install-zig@v0.2.1
              with:
                  version: 0.15.0

            - name: Download library artifact
              uses: actions/download-artifact@v4
              with:
                  name: library-artifact
                  path: cli/lib

            - name: Build CLI
              run: |
                  cd cli
                  zig build

            - name: Test CLI
              run: |
                  ./cli/zig-out/bin/registry --help
